name: Validate submission PR
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 300
            });

            const ALLOWED_EXT = /\.(pdf|docx|ipynb|md|txt|py|png|jpg|jpeg|zip|csv)$/i;
            const BAD_NAME = /(Новый документ|New Document|Untitled|Document\d)/i;
            // Accept BOTH class_N (underscore) and class-N (dash) so we don't reject
            // students for a single character. We'll still warn so they fix it next time.
            const SUBMISSIONS_PATH = /^module[-_]\d+\/class[-_]\d+\/(submissions\/)?[^\/]+/;
            const ALLOWED_OUTSIDE = /^(\.github|README\.md|LICENSE|\.gitignore)/;

            const errors = [];
            const warnings = [];

            for (const f of files) {
              if (f.status === "removed") continue;

              // Soft warning: dash instead of underscore (don't block)
              if (/^module-\d+\/class-\d+/.test(f.filename)) {
                warnings.push("⚠ `" + f.filename + "` — please use `class_N` (underscore) next time. Accepted for now.");
              }

              // If under a module-* or module_* tree, must be in a recognised submissions path
              if (/^module[-_]\d+/.test(f.filename) && !SUBMISSIONS_PATH.test(f.filename)) {
                errors.push("❌ `" + f.filename + "` — file is not inside `module-N/class_X/submissions/`. Move it there.");
                continue;
              }

              // Extension check (only for files in module tree)
              if (SUBMISSIONS_PATH.test(f.filename) && !ALLOWED_EXT.test(f.filename)) {
                errors.push("❌ `" + f.filename + "` — format not allowed. Use `.pdf`, `.docx`, `.ipynb`, `.md`, `.txt`, `.py`, `.png`, `.jpg`, `.zip`, or `.csv`.");
              }

              // Placeholder filename — warn only, don't block
              if (SUBMISSIONS_PATH.test(f.filename) && BAD_NAME.test(f.filename)) {
                warnings.push("⚠ `" + f.filename + "` — placeholder filename. Consider renaming to `<YourName>_Class<N>.<ext>`.");
              }

              // Modifying existing files — WARNING ONLY (students need to be able to update their work)
              if (f.status === "modified" || f.status === "changed" || f.status === "renamed") {
                if (!ALLOWED_OUTSIDE.test(f.filename)) {
                  warnings.push("ℹ `" + f.filename + "` — updating an existing submission. That's fine.");
                }
              }
            }

            let body;
            if (errors.length === 0 && warnings.length === 0) {
              body = "✅ **Submission check passed** — your PR looks clean. A mentor will review and merge.";
            } else if (errors.length === 0) {
              body = "✅ **Submission check passed** with " + warnings.length + " note" + (warnings.length>1?"s":"") + ":\n\n" + warnings.map(w => "- " + w).join("\n");
            } else {
              body = "## ❌ Submission check failed (" + errors.length + " issue" + (errors.length>1?"s":"") + ")\n\nFix these before asking for review:\n\n" + errors.map(e => "- " + e).join("\n");
              if (warnings.length > 0) {
                body += "\n\n### Notes\n\n" + warnings.map(w => "- " + w).join("\n");
              }
              body += "\n\nAfter you fix them, push new commits to this branch — the check re-runs automatically.";
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            if (errors.length > 0) {
              core.setFailed(errors.length + " submission issue(s) — see PR comment for details.");
            }
